spring:
  application:
    name: Omni-BE-Sponsor
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

cors:
  urls:
    httpsGatewayURL: ${HTTPS_GATEWAY_URL}
    frontURL: ${FRONT_URL}

springdoc:
  api-docs:
    path: ${SPONSOR_SWAGGER_PATH}
  swagger-ui:
    path: ${SPONSOR_SWAGGER_PATH}

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health, metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
      percentiles-histogram:
        http.server.requests: true

CARD_SERVER_ADDRESS: ${CARD_SERVER_ADDRESS}